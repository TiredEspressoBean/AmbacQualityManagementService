      - Import/Export
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV or Excel file to import
                mode:
                  type: string
                  enum:
                  - create
                  - update
                  - upsert
                  description: 'Import mode: create, update, or upsert (default)'
              required:
              - file
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '207':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportResponse'
          description: ''
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportQueued'
          description: ''
        '400':
          content:
            application/json:
