          description: List of channel codes, e.g. ['email', 'in_app'].
        priority:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        enabled:
          type: boolean
        min_gap_seconds:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Per-(rule, recipient) cooldown. Recipients will not receive
