        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - ACCEPTED
          - AWAITING_INSPECTION
          - CONSUMED
          - IN_USE
          - QUARANTINE
          - RECEIVED
          - REJECTED
          - SCRAPPED
