          description: Use this provider as the default for AI features
        is_enabled:
          type: boolean
          description: Whether this provider configuration is active
        model_name:
          type: string
          minLength: 1
          description: Model identifier (e.g., 'gpt-4o', 'claude-3-5-sonnet-20240620',
            'llama3')
          maxLength: 100
        base_url:
          type: string
          format: uri
          description: Base URL for Ollama server (e.g., 'http://localhost:11434')
          maxLength: 200
        api_key:
          type: string
          writeOnly: true
          description: API key (write-only, never returned in responses)
