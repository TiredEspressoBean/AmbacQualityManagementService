        - accept_to_inventory -> Creates a Parts record for reuse
        - scrap -> Marks as scrapped
      parameters:
      - in: query
        name: component_type
        schema:
          type: string
          format: uuid
      - in: query
        name: condition_grade
        schema:
          type: string
          enum:
          - A
          - B
          - C
          - SCRAP
        description: |-
          * `A` - Grade A - Excellent
          * `B` - Grade B - Good
          * `C` - Grade C - Fair
          * `SCRAP` - Scrap - Not Usable
      - in: query
        name: core
        schema:
          type: string
          format: uuid
      - in: query
        name: is_scrapped
        schema:
          type: boolean
      - name: limit
        required: false
