          type: string
          format: uuid
        nodes:
          type: array
          items:
            type: object
            additionalProperties: {}
          writeOnly: true
        edges:
          type: array
          items:
            type: object
            additionalProperties: {}
          writeOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/ProcessStatusEnum'
          description: |-
            Controls editability and availability for work orders

            * `DRAFT` - Draft
            * `PENDING_APPROVAL` - Pending Approval
            * `APPROVED` - Approved
            * `DEPRECATED` - Deprecated
        change_description:
          type: string
          nullable: true
          description: Description of changes from previous version (for approval
            review)
