    ThreeDModel:
      type: object
      description: |-
        Serializer for 3D model files with versioning support.

        Content edits (name, part_type, step, file) create a new version via
        `create_new_version`.  Archive-only updates go through a plain save.

        Processing-state fields (processing_status, processing_error,
        processed_at, face_count, vertex_count, final_size_bytes,
        original_filename, original_format, original_size_bytes, file_type)
        are operational — updated in-place by Celery workers and excluded from
        versioning triggers.

        Includes processing status for async conversion workflow:
        - pending: Uploaded, waiting for processing
        - processing: Currently being converted/optimized
        - completed: Ready for viewing
        - failed: Processing error (see processing_error field)
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        file:
          type: string
          format: uri
        part_type:
          type: string
          format: uuid
        part_type_display:
          type: string
          readOnly: true
        step:
          type: string
          format: uuid
          nullable: true
        step_display:
          type: string
          readOnly: true
        uploaded_at:
          type: string
          format: date-time
          readOnly: true
        file_type:
          type: string
          readOnly: true
          description: Output format after processing (always 'glb')
        annotation_count:
          type: integer
          readOnly: true
        processing_status:
          allOf:
          - $ref: '#/components/schemas/ProcessingStatusEnum'
          readOnly: true
          description: |-
            Current processing state

            * `PENDING` - Pending
            * `PROCESSING` - Processing
            * `COMPLETED` - Completed
            * `FAILED` - Failed
        processing_error:
          type: string
          readOnly: true
          description: Error message if processing failed
        processed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: When processing completed
        is_ready:
          type: boolean
          readOnly: true
        processing_metrics:
          type: object
          additionalProperties: {}
          nullable: true
          readOnly: true
        original_filename:
          type: string
          readOnly: true
          description: Original uploaded filename
        original_format:
          type: string
          readOnly: true
          description: Original file format (e.g., 'step', 'stl', 'obj')
        original_size_bytes:
          type: integer
          readOnly: true
          nullable: true
          description: Original file size in bytes
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        archived:
          type: boolean
        deleted_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        version:
          type: integer
          readOnly: true
        is_current_version:
          type: boolean
          readOnly: true
        previous_version:
          type: string
          format: uuid
          readOnly: true
          nullable: true
      required:
      - annotation_count
      - created_at
      - deleted_at
      - file
      - file_type
      - id
      - is_current_version
      - is_ready
      - name
      - original_filename
      - original_format
      - original_size_bytes
      - part_type
      - part_type_display
      - previous_version
      - processed_at
      - processing_error
      - processing_metrics
      - processing_status
      - step_display
      - updated_at
      - uploaded_at
      - version
