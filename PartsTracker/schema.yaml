      - supplier_name
      - updated_at
    OutsideProcessShipmentRequest:
      type: object
      description: |-
        Outside-process (subcontract) shipment — the Flow B send/return aggregate.

        Read-mostly: shipments are created + transitioned via the viewset's send_out /
        receive_back / accept / reject actions (services.mes.outside_process), not via
        plain CRUD writes. `quantity` (the linked-part count) is the return-inspection
        lot size.
      properties:
        supplier:
          type: string
          format: uuid
        step:
          type: string
          format: uuid
        work_order:
          type: string
          format: uuid
          nullable: true
          description: The work order the shipped parts belong to (usually one).
        reference:
          type: string
          description: Outbound PO / packing-slip reference.
          maxLength: 120
        return_reference:
          type: string
          description: Inbound packing-slip reference on return.
          maxLength: 120
        notes:
          type: string
        archived:
          type: boolean
      required:
      - step
      - supplier
    OutsideProcessShipmentStatusEnum:
      enum:
      - SENT
      - RETURNED
      - CLOSED
      type: string
      description: |-
        * `SENT` - Sent Out
        * `RETURNED` - Returned
        * `CLOSED` - Closed
