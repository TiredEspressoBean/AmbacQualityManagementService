openapi: 3.0.3
info:
  title: My Project API
  version: 1.0.0
  description: REST endpoints for our tracker system
paths:
  /api/ApprovalRequests/:
    get:
      operationId: api_ApprovalRequests_list
      description: List approval requests with filtering and search
      parameters:
      - in: query
        name: approval_type
        schema:
          type: string
        description: Filter by approval type
      - in: query
        name: content_type
        schema:
          type: integer
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: object_id
        schema:
          type: string
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: overdue
        schema:
          type: boolean
        description: Show only overdue approvals
      - in: query
        name: requested_by
        schema:
          type: integer
        description: Filter by requester user ID
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
        description: Filter by status (PENDING, APPROVED, REJECTED, CANCELLED)
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedApprovalRequestList'
          description: ''
    post:
      operationId: api_ApprovalRequests_create
      description: Create a new approval request
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApprovalRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApprovalRequestRequest'
        required: true
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequest'
          description: ''
  /api/ApprovalRequests/{id}/:
    get:
      operationId: api_ApprovalRequests_retrieve
      description: Retrieve a specific approval request
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Approval Request.
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequest'
          description: ''
    put:
      operationId: api_ApprovalRequests_update
      description: Update an approval request
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Approval Request.
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApprovalRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApprovalRequestRequest'
        required: true
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequest'
          description: ''
    patch:
      operationId: api_ApprovalRequests_partial_update
      description: Partially update an approval request
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Approval Request.
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedApprovalRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedApprovalRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedApprovalRequestRequest'
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequest'
          description: ''
    delete:
      operationId: api_ApprovalRequests_destroy
      description: Cancel an approval request
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Approval Request.
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '204':
          description: No response body
  /api/ApprovalRequests/{id}/claim/:
    post:
      operationId: api_ApprovalRequests_claim_create
      description: 'Claim a group-routed approval: self-assign as its approver so
        it moves from the group''s shared queue into the caller''s pending list.'
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Approval Request.
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequest'
          description: ''
  /api/ApprovalRequests/{id}/pending-approvers/:
    get:
      operationId: api_ApprovalRequests_pending_approvers_retrieve
      description: Get list of pending approvers for this request
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Approval Request.
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequest'
          description: ''
  /api/ApprovalRequests/{id}/submit-response/:
    post:
      operationId: api_ApprovalRequests_submit_response_create
      description: Submit an approval response (approve/reject/delegate) with optional
        signature + password identity verification.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Approval Request.
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalResponseSubmitRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApprovalResponseSubmitRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApprovalResponseSubmitRequestRequest'
        required: true
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalResponse'
          description: ''
  /api/ApprovalRequests/claimable/:
    get:
      operationId: api_ApprovalRequests_claimable_list
      description: 'Approvals the current user can claim: pending, routed to one of
        their groups, and not yet claimed or individually assigned.'
      parameters:
      - in: query
        name: approval_type
        schema:
          type: string
          enum:
          - CAPA_APPROVAL
          - CAPA_CRITICAL
          - CAPA_MAJOR
          - DOCUMENT_RELEASE
          - ECO
          - FAI
          - PCN_RELEASE
          - PCO_APPROVAL
          - PCR_APPROVAL
          - PPAP
          - PROCESS_APPROVAL
          - TRAINING_CERT
        description: |-
          * `DOCUMENT_RELEASE` - Document Release
          * `CAPA_APPROVAL` - CAPA Approval
          * `CAPA_CRITICAL` - CAPA Critical
          * `CAPA_MAJOR` - CAPA Major
          * `ECO` - Engineering Change Order
          * `TRAINING_CERT` - Training Certification
          * `PROCESS_APPROVAL` - Process Approval
          * `PCR_APPROVAL` - Process Change Request Approval
          * `PCO_APPROVAL` - Process Change Order Approval
          * `PCN_RELEASE` - Process Change Notice Release
          * `PPAP` - PPAP
          * `FAI` - First Article (FAI / AS9102)
      - in: query
        name: content_type
        schema:
          type: integer
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: object_id
        schema:
          type: string
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: requested_by
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - APPROVED
          - CANCELLED
          - NOT_REQUIRED
          - PENDING
          - REJECTED
        description: |-
          * `NOT_REQUIRED` - Not Required
          * `PENDING` - Pending
          * `APPROVED` - Approved
          * `REJECTED` - Rejected
          * `CANCELLED` - Cancelled
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedApprovalRequestList'
          description: ''
  /api/ApprovalRequests/export-excel/:
    get:
      operationId: api_ApprovalRequests_export_excel_retrieve
      description: Export the current queryset to Excel format. Respects all filters,
        search, and ordering applied to the list view.
      parameters:
      - in: query
        name: fields
        schema:
          type: string
        description: Comma-separated list of field names to export (e.g., id,name,status)
      - in: query
        name: filename
        schema:
          type: string
        description: Custom filename for the download (e.g., my_export.xlsx)
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
                description: Excel file download
          description: ''
  /api/ApprovalRequests/metadata/:
    get:
      operationId: api_ApprovalRequests_metadata_retrieve
      description: Return searchable/filterable/orderable field information with filter
