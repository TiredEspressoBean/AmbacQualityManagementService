    PatchedPersonalRuleRequest:
      type: object
      description: |-
        User-authored. Owner is the implicit recipient — no recipient_* fields
        are exposed.

        `owner_user` is write-once at create time; the viewset stamps it from the
        request user. The serializer exposes it read-only so clients can see who
        owns a rule but can't reassign it. Phase 4 may add an explicit "transfer
        ownership" endpoint if needed.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
        event_code:
          type: string
          minLength: 1
          description: Must exist in EVENT_REGISTRY (validated at save time).
          maxLength: 64
        conditions_source:
          type: string
          description: CEL expression evaluated against the event's payload.
        channels:
          description: List of channel codes, e.g. ['email', 'in_app'].
        priority:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        enabled:
          type: boolean
        min_gap_seconds:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Per-(rule, recipient) cooldown. Recipients will not receive
            another notification from this rule until this many seconds have passed.
            0 disables dedup.
        recipient_strategy:
          allOf:
          - $ref: '#/components/schemas/RecipientStrategyEnum'
          description: |-
            Where to pull recipients from at fire time. 'static' uses the rule's M2M lists only; 'from_payload' reads recipient IDs from the event's payload; 'union' combines both.

            * `static` - Static — recipients from this rule only
            * `from_payload` - From event — recipients from the event payload
            * `union` - Union — combine event-payload recipients with this rule's
        escalation:
          allOf:
          - $ref: '#/components/schemas/_EscalationRequest'
          nullable: true
    PatchedPersonalScheduleRequest:
      type: object
      description: |-
        User-authored. Owner is the implicit recipient — no recipient_*
