    PartApproval:
      type: object
      description: |-
        Base serializer for SecureModel instances.

        Tenant safety: sets ``serializer_related_field`` so DRF auto-generates
        FK fields as ``TenantScopedPrimaryKeyRelatedField`` — these re-scope their
        lookup queryset to the current-request tenant, so a request body can't
        reference another tenant's row by PK. The scoped field no-ops on
        non-tenant target models (User, ContentType, …), so those are unaffected.

        This is why serializers should inherit ``SecureModelMixin`` instead of
        ``serializers.ModelSerializer`` directly. ``test_serializer_fk_tenant_scoping``
        guards against FK fields that bypass this.

        NOTE: this is now a concrete ``ModelSerializer`` subclass, not a bare
        mixin — declare it as the FIRST/sole serializer base. Listing
        ``serializers.ModelSerializer`` alongside it is redundant and (when listed
        before it) an MRO error.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        approval_number:
          type: string
          readOnly: true
        part_type:
          type: string
          format: uuid
        part_type_name:
          type: string
          readOnly: true
        supplier:
          type: string
          format: uuid
        supplier_name:
          type: string
          readOnly: true
        approval_type:
          $ref: '#/components/schemas/PartApprovalTypeEnum'
        approval_type_display:
          type: string
          readOnly: true
        reference:
          type: string
          description: PPAP/FAI package or submission reference (the artifact stays
            external).
          maxLength: 120
        status:
          allOf:
          - $ref: '#/components/schemas/QualificationStatusEnum'
          readOnly: true
        status_display:
          type: string
          readOnly: true
        effective_date:
          type: string
          format: date
          nullable: true
        expiry_date:
          type: string
          format: date
          nullable: true
        approval_request:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        approved_by:
          type: integer
          readOnly: true
          nullable: true
        notes:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        archived:
          type: boolean
      required:
      - approval_number
      - approval_request
      - approval_type_display
      - approved_by
      - created_at
      - id
      - part_type
      - part_type_name
      - status
      - status_display
      - supplier
      - supplier_name
      - updated_at
    PartApprovalRequest:
      type: object
      description: |-
        Base serializer for SecureModel instances.

        Tenant safety: sets ``serializer_related_field`` so DRF auto-generates
        FK fields as ``TenantScopedPrimaryKeyRelatedField`` — these re-scope their
        lookup queryset to the current-request tenant, so a request body can't
        reference another tenant's row by PK. The scoped field no-ops on
        non-tenant target models (User, ContentType, …), so those are unaffected.

        This is why serializers should inherit ``SecureModelMixin`` instead of
        ``serializers.ModelSerializer`` directly. ``test_serializer_fk_tenant_scoping``
        guards against FK fields that bypass this.

        NOTE: this is now a concrete ``ModelSerializer`` subclass, not a bare
