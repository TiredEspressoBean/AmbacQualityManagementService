    PatchedPartApprovalRequest:
      type: object
      description: |-
        Base serializer for SecureModel instances.

        Tenant safety: sets ``serializer_related_field`` so DRF auto-generates
        FK fields as ``TenantScopedPrimaryKeyRelatedField`` — these re-scope their
        lookup queryset to the current-request tenant, so a request body can't
        reference another tenant's row by PK. The scoped field no-ops on
        non-tenant target models (User, ContentType, …), so those are unaffected.

        This is why serializers should inherit ``SecureModelMixin`` instead of
        ``serializers.ModelSerializer`` directly. ``test_serializer_fk_tenant_scoping``
        guards against FK fields that bypass this.

        NOTE: this is now a concrete ``ModelSerializer`` subclass, not a bare
        mixin — declare it as the FIRST/sole serializer base. Listing
        ``serializers.ModelSerializer`` alongside it is redundant and (when listed
        before it) an MRO error.
      properties:
        part_type:
          type: string
          format: uuid
        supplier:
          type: string
          format: uuid
        approval_type:
          $ref: '#/components/schemas/PartApprovalTypeEnum'
        reference:
          type: string
          description: PPAP/FAI package or submission reference (the artifact stays
            external).
          maxLength: 120
        effective_date:
          type: string
          format: date
          nullable: true
        expiry_date:
          type: string
          format: date
          nullable: true
        notes:
          type: string
        archived:
          type: boolean
    PatchedPartTypesRequest:
      type: object
      description: |-
        Part types serializer with versioning support.

        Content edits (name, ID_prefix, ERP_id, ITAR fields) create a new
        version via `create_new_version`.  Archive-only updates go through a
        plain save.
      properties:
        tenant:
          type: string
          format: uuid
          nullable: true
          description: Tenant this record belongs to
        external_id:
          type: string
          nullable: true
          description: External system identifier for integration sync
          maxLength: 255
        archived:
          type: boolean
        name:
          type: string
          minLength: 1
          maxLength: 50
        ID_prefix:
          type: string
          nullable: true
          maxLength: 50
        ERP_id:
          type: string
          nullable: true
          maxLength: 50
        requires_supplier_qualification:
          type: boolean
          description: Require an approved SupplierQualification covering the supplier
            before a received lot of this part type can be accepted into stock.
        requires_part_approval:
          type: boolean
          description: Require an active PartApproval (PPAP/FAI) covering the (part
            type, supplier) before a received lot of this part type can be accepted
            into stock.
        itar_controlled:
          type: boolean
          description: Part type is ITAR-controlled defense article (22 CFR 121 USML)
        eccn:
          type: string
          description: Default ECCN for parts of this type (e.g., EAR99, 9A004)
          maxLength: 20
        usml_category:
          type: string
          description: USML Category if ITAR-controlled (e.g., IV, XI, XIX)
          maxLength: 10
        default_disassembly_process:
          type: string
          format: uuid
          nullable: true
          description: 'Canonical preference for the teardown picker. When set, the
            operator''s bulk-teardown dialog preselects this Process. Optional: when
            null, the picker has no preselection and (for automation paths) WO creation
            refuses to resolve a default.'
