          type: object
          additionalProperties: {}
          nullable: true
          readOnly: true
        rules:
          type: array
          items: {}
          readOnly: true
        supplier:
          type: string
          format: uuid
          nullable: true
          description: Supplier scope for receiving acceptance sampling. Null = all
            suppliers.
        aql:
          type: string
          format: decimal
          pattern: ^-?\d{0,2}(?:\.\d{0,3})?$
          nullable: true
          description: Acceptable Quality Limit for AQL/C=0 lot acceptance.
        inspection_level:
          type: string
          description: ANSI/ASQ Z1.4 inspection level (I/II/III) for AQL sampling.
          maxLength: 3
        severity:
          type: string
          description: AQL inspection severity (NORMAL/TIGHTENED/REDUCED).
          maxLength: 10
        strategy:
          type: string
          description: 'Acceptance-sampling strategy: C0 (default), Z14, or Z19 (variables).'
          maxLength: 4
        gate_metric:
          description: |-
            Aggregate signal this step watches. Blank = no gate.

            * `CONSECUTIVE_FAILS` - Consecutive failures
            * `FAIL_RATE_PCT` - Failure rate (%)
            * `DEFECTIVE_COUNT` - Defective count
          oneOf:
          - $ref: '#/components/schemas/GateMetricEnum'
          - $ref: '#/components/schemas/BlankEnum'
        gate_threshold:
          type: string
          format: decimal
          pattern: ^-?\d{0,4}(?:\.\d{0,3})?$
          nullable: true
          description: 'Threshold: percent for FAIL_RATE_PCT, count otherwise.'
        gate_window:
          description: |-
            Window the metric is computed over.

            * `WORK_ORDER` - Whole work order at this step
            * `ROLLING_N` - Rolling last N inspections
            * `LOT` - Receiving lot sample
          oneOf:
          - $ref: '#/components/schemas/GateWindowEnum'
          - $ref: '#/components/schemas/BlankEnum'
        gate_window_n:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
          description: N for ROLLING_N windows.
        gate_min_sample:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
          description: Minimum inspections before a FAIL_RATE_PCT gate can fire.
        gate_actions:
          description: List of GateAction codes to fire when the gate trips.
        gate_capa_type:
          type: string
          description: CAPA type for a RAISE_CAPA_SCAR action (SUPPLIER => SCAR).
          maxLength: 20
        gate_capa_severity:
          type: string
          description: Severity for a RAISE_CAPA_SCAR action.
          maxLength: 10
        gate_approval_template:
          type: string
          format: uuid
          nullable: true
          description: Template for a REQUIRE_APPROVAL action.
        created_by:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        modified_by:
          type: integer
          nullable: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        part_type_name:
          type: string
          readOnly: true
        process_name:
          type: string
          readOnly: true
        archived:
          type: boolean
      required:
      - created_at
      - id
      - name
      - part_type
      - part_type_info
      - part_type_name
      - process_info
      - process_name
      - rules
      - step
      - step_info
      - updated_at
      - version
