          * `CAPA_CRITICAL` - CAPA Critical
          * `CAPA_MAJOR` - CAPA Major
          * `ECO` - Engineering Change Order
          * `TRAINING_CERT` - Training Certification
          * `PROCESS_APPROVAL` - Process Approval
          * `PCR_APPROVAL` - Process Change Request Approval
          * `PCO_APPROVAL` - Process Change Order Approval
          * `PCN_RELEASE` - Process Change Notice Release
          * `PPAP` - PPAP
          * `FAI` - First Article (FAI / AS9102)
      - in: query
        name: content_type
        schema:
          type: integer
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: object_id
        schema:
          type: string
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: requested_by
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - APPROVED
          - CANCELLED
          - NOT_REQUIRED
          - PENDING
          - REJECTED
        description: |-
          * `NOT_REQUIRED` - Not Required
          * `PENDING` - Pending
          * `APPROVED` - Approved
          * `REJECTED` - Rejected
          * `CANCELLED` - Cancelled
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedApprovalRequestList'
          description: ''
  /api/ApprovalResponses/:
    get:
      operationId: api_ApprovalResponses_list
      description: List approval responses with filtering
      parameters:
      - in: query
        name: approval_request
        schema:
          type: integer
        description: Filter by approval request ID
      - in: query
        name: approver
        schema:
          type: integer
        description: Filter by approver user ID
      - in: query
        name: decision
        schema:
          type: string
        description: Filter by decision (APPROVED, REJECTED, DELEGATED)
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: verification_method
        schema:
          type: string
          enum:
          - NONE
          - PASSWORD
          - SSO
        description: |-
          * `PASSWORD` - Password
          * `SSO` - SSO
          * `NONE` - None
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedApprovalResponseList'
          description: ''
    post:
      operationId: api_ApprovalResponses_create
      description: Create a new approval response
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalResponseRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApprovalResponseRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApprovalResponseRequest'
        required: true
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalResponse'
          description: ''
  /api/ApprovalResponses/{id}/:
    get:
      operationId: api_ApprovalResponses_retrieve
      description: Retrieve a specific approval response
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Approval Response.
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalResponse'
          description: ''
    put:
      operationId: api_ApprovalResponses_update
      description: Update an approval response
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Approval Response.
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalResponseRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApprovalResponseRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApprovalResponseRequest'
        required: true
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalResponse'
          description: ''
    patch:
      operationId: api_ApprovalResponses_partial_update
      description: Partially update an approval response
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Approval Response.
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedApprovalResponseRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedApprovalResponseRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedApprovalResponseRequest'
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalResponse'
          description: ''
    delete:
      operationId: api_ApprovalResponses_destroy
      description: |-
        ViewSet for managing approval responses.

        Approval responses record individual approver decisions with signature capture,
        identity verification, and delegation support.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Approval Response.
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '204':
          description: No response body
  /api/ApprovalResponses/{id}/delegate/:
    post:
      operationId: api_ApprovalResponses_delegate_create
      description: Delegate this approval to another user
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Approval Response.
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalResponseRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApprovalResponseRequest'
          multipart/form-data:
