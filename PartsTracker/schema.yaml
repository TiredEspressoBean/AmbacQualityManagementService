    QuarantineDispositionRequest:
      type: object
      description: |-
        Base serializer for SecureModel instances.

        Tenant safety: sets ``serializer_related_field`` so DRF auto-generates
        FK fields as ``TenantScopedPrimaryKeyRelatedField`` — these re-scope their
        lookup queryset to the current-request tenant, so a request body can't
        reference another tenant's row by PK. The scoped field no-ops on
        non-tenant target models (User, ContentType, …), so those are unaffected.

        This is why serializers should inherit ``SecureModelMixin`` instead of
        ``serializers.ModelSerializer`` directly. ``test_serializer_fk_tenant_scoping``
        guards against FK fields that bypass this.

        NOTE: this is now a concrete ``ModelSerializer`` subclass, not a bare
        mixin — declare it as the FIRST/sole serializer base. Listing
        ``serializers.ModelSerializer`` alongside it is redundant and (when listed
        before it) an MRO error.
      properties:
        current_state:
          $ref: '#/components/schemas/CurrentStateEnum'
        disposition_type:
          oneOf:
          - $ref: '#/components/schemas/DispositionTypeEnum'
          - $ref: '#/components/schemas/BlankEnum'
        severity:
          $ref: '#/components/schemas/SeverityEnum'
        assigned_to:
          type: integer
          nullable: true
        due_date:
          type: string
          format: date
          nullable: true
          description: Target resolution date — drives the due dot on quality inboxes
        description:
          type: string
        resolution_notes:
          type: string
        resolution_completed:
          type: boolean
        resolution_completed_by:
          type: integer
          nullable: true
        resolution_completed_at:
          type: string
          format: date-time
          nullable: true
        containment_action:
          type: string
          description: Immediate action taken to prevent escape
        containment_completed_at:
          type: string
          format: date-time
          nullable: true
        containment_completed_by:
          type: integer
          nullable: true
        requires_customer_approval:
          type: boolean
        customer_approval_received:
          type: boolean
        customer_approval_reference:
          type: string
          description: PO#, email reference, or approval document number
          maxLength: 100
        customer_approval_date:
          type: string
          format: date
          nullable: true
        scrap_verified:
          type: boolean
        scrap_verification_method:
          type: string
          description: 'How product was rendered unusable: crushed, marked, etc.'
          maxLength: 100
        scrap_verified_by:
          type: integer
          nullable: true
        scrap_verified_at:
          type: string
          format: date-time
          nullable: true
        part:
          type: string
          format: uuid
          nullable: true
        batch_execution:
          type: string
          format: uuid
          nullable: true
          description: Set when this disposition covers a failed batch cycle (the
            whole load), instead of a single part. Affected parts are the batch's
            members. Mutually exclusive with `part` in practice.
        step:
          type: string
          format: uuid
          nullable: true
        rework_attempt_at_step:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        quality_reports:
          type: array
          items:
            type: string
            format: uuid
