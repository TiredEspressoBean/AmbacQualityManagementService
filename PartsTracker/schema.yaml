          description: ''
  /api/ApprovalTemplates/:
    get:
      operationId: api_ApprovalTemplates_list
      description: List approval templates with filtering and search
      parameters:
      - in: query
        name: active
        schema:
          type: boolean
        description: Filter by active status
      - in: query
        name: approval_flow_type
        schema:
          type: string
          enum:
          - ALL_REQUIRED
          - ANY
          - THRESHOLD
        description: |-
          * `ALL_REQUIRED` - All Required
          * `THRESHOLD` - Threshold
          * `ANY` - Any
      - in: query
        name: approval_sequence
        schema:
          type: string
          enum:
          - PARALLEL
          - SEQUENTIAL
        description: |-
          * `PARALLEL` - Parallel
          * `SEQUENTIAL` - Sequential
      - in: query
        name: approval_type
        schema:
          type: string
        description: Filter by approval type
      - in: query
        name: delegation_policy
        schema:
          type: string
          enum:
          - DISABLED
          - OPTIONAL
        description: |-
          * `OPTIONAL` - Optional
          * `DISABLED` - Disabled
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedApprovalTemplateList'
          description: ''
    post:
      operationId: api_ApprovalTemplates_create
      description: Create a new approval template
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalTemplateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApprovalTemplateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApprovalTemplateRequest'
        required: true
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalTemplate'
          description: ''
  /api/ApprovalTemplates/{id}/:
    get:
      operationId: api_ApprovalTemplates_retrieve
      description: Retrieve a specific approval template
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Approval Template.
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalTemplate'
          description: ''
    put:
      operationId: api_ApprovalTemplates_update
      description: Update an approval template
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Approval Template.
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalTemplateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApprovalTemplateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApprovalTemplateRequest'
        required: true
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
