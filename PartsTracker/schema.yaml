          description: ''
  /api/ApprovalResponses/export-excel/:
    get:
      operationId: api_ApprovalResponses_export_excel_retrieve
      description: Export the current queryset to Excel format. Respects all filters,
        search, and ordering applied to the list view.
      parameters:
      - in: query
