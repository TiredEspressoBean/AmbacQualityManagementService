          type: string
          nullable: true
          readOnly: true
        responded_at:
          type: string
          format: date-time
          readOnly: true
          description: UTC timestamp when the response was captured.
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
