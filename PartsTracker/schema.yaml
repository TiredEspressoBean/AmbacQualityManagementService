      type: object
      description: Admin-authored, fires tenant-wide. Recipients are internal.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 200
        description:
          type: string
        event_code:
          type: string
          description: Must exist in EVENT_REGISTRY (validated at save time).
          maxLength: 64
        conditions_source:
          type: string
          description: CEL expression evaluated against the event's payload.
        channels:
          description: List of channel codes, e.g. ['email', 'in_app'].
        priority:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        enabled:
          type: boolean
        min_gap_seconds:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Per-(rule, recipient) cooldown. Recipients will not receive
            another notification from this rule until this many seconds have passed.
            0 disables dedup.
        recipient_strategy:
          allOf:
          - $ref: '#/components/schemas/RecipientStrategyEnum'
          description: |-
            Where to pull recipients from at fire time. 'static' uses the rule's M2M lists only; 'from_payload' reads recipient IDs from the event's payload; 'union' combines both.

            * `static` - Static — recipients from this rule only
            * `from_payload` - From event — recipients from the event payload
            * `union` - Union — combine event-payload recipients with this rule's
        escalation:
          allOf:
          - $ref: '#/components/schemas/_Escalation'
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        recipient_users:
          type: array
          items:
            type: integer
        recipient_groups:
          type: array
          items:
            type: string
            format: uuid
      required:
      - created_at
      - id
      - name
      - updated_at
