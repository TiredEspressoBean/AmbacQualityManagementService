  /api/Cores/:
    get:
      operationId: api_Cores_list
      description: |-
        Remanufacturing core management with disassembly workflow.

        Workflow:
        1. Create core (status: received)
        2. start_disassembly -> status: in_disassembly
        3. Create HarvestedComponents as components are extracted
        4. complete_disassembly -> status: disassembled

        Alternative: scrap -> status: scrapped (if core not suitable)
      parameters:
      - in: query
        name: condition_grade
        schema:
          type: string
          enum:
          - A
          - B
          - C
          - SCRAP
        description: |-
          Overall condition grade assigned at receipt

          * `A` - Grade A - Excellent
          * `B` - Grade B - Good
          * `C` - Grade C - Fair
          * `SCRAP` - Scrap - Not Usable
      - in: query
        name: core_type
        schema:
          type: string
          format: uuid
      - in: query
        name: customer
        schema:
          type: string
          format: uuid
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: source_type
        schema:
          type: string
          enum:
          - CUSTOMER_RETURN
          - PURCHASED
          - TRADE_IN
          - WARRANTY
        description: |-
          * `CUSTOMER_RETURN` - Customer Return
          * `PURCHASED` - Purchased Core
          * `WARRANTY` - Warranty Return
          * `TRADE_IN` - Trade-In
      - in: query
        name: status
        schema:
          type: string
          enum:
          - DISASSEMBLED
          - IN_DISASSEMBLY
          - RECEIVED
          - SCRAPPED
        description: |-
          * `RECEIVED` - Received
          * `IN_DISASSEMBLY` - In Disassembly
          * `DISASSEMBLED` - Disassembled
          * `SCRAPPED` - Scrapped
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCoreListList'
          description: ''
    post:
      operationId: api_Cores_create
      description: |-
        Remanufacturing core management with disassembly workflow.

        Workflow:
        1. Create core (status: received)
        2. start_disassembly -> status: in_disassembly
        3. Create HarvestedComponents as components are extracted
        4. complete_disassembly -> status: disassembled

        Alternative: scrap -> status: scrapped (if core not suitable)
