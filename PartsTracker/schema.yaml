      type: object
      description: |-
        Per-node operator capture rows (text / choice / photo / file /
        timer / computed).
      properties:
        step_execution:
          type: string
          format: uuid
          nullable: true
          description: Set when the substep is per-part (scope=SAMPLED). Exactly one
            of step_execution / batch_execution should be set.
        substep:
          type: string
          format: uuid
          description: The substep the capture node lives in.
        node_id:
          type: string
          minLength: 1
          description: 'UUIDv7 of the capture node in Substep.body_blocks (minted
            client-side per decision #18).'
          maxLength: 64
        kind:
          allOf:
          - $ref: '#/components/schemas/KindEnum'
          description: |-
            Which kind of capture node produced this response.

            * `text` - Text input
            * `choice` - Choice (radio / select)
            * `photo` - Photo capture
            * `video` - Video capture
            * `scan` - Barcode / QR scan
            * `file` - File upload
            * `timer` - Timer (countdown / stopwatch)
            * `computed` - Computed value (formula)
            * `attestation` - Attestation (confirm / signature)
            * `status` - Quality status (PASS / FAIL / PENDING)
            * `equipment_roles` - Equipment + roles
            * `personnel_roles` - Personnel + roles
            * `signatures` - Inspection signatures (detected / verified)
            * `defects` - Defect findings
            * `annotation` - Part annotation (3D)
            * `harvested_components` - Harvested components (teardown)
        value_text:
          type: string
          description: 'Short text capture: text input, choice selection, scan code.'
        value_document:
          type: string
          format: uuid
          nullable: true
          description: 'Photo / video / file capture: FK to the uploaded Documents
            row.'
        value_json:
          nullable: true
          description: 'Structured payload for kinds that don''t fit a single string:
            Timer (started_at/completed_at/elapsed_seconds/direction), ComputedValue
            (inputs/result/in_spec).'
        responded_by:
          type: integer
          description: Operator who captured the response.
