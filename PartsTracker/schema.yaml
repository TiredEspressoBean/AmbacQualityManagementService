          - $ref: '#/components/schemas/BlankEnum'
        is_terminal:
          type: boolean
        terminal_status:
          oneOf:
          - $ref: '#/components/schemas/TerminalStatusEnum'
          - $ref: '#/components/schemas/BlankEnum'
        max_visits:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
          description: Max times a part can visit this step. Null = unlimited.
        revisit_assignment:
          $ref: '#/components/schemas/RevisitAssignmentEnum'
        revisit_role:
          type: string
          format: uuid
          nullable: true
          description: Required role when revisit_assignment='role'
        sequencing_mode:
          type: string
          description: How this Op's substeps are ordered for the operator. 'sequential'
            = substep N requires N-1 complete; 'free_order' = any order. Choices defined
            in Tracker.models.dwi.SequencingMode.
          maxLength: 20
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        archived:
          type: boolean
        version:
          type: integer
          readOnly: true
      required:
      - created_at
      - id
      - name
      - part_type
      - part_type_info
      - part_type_name
      - updated_at
      - version
    StepsRequest:
      type: object
      description: |-
        Steps serializer - represents step node properties.

        Steps are now independent entities that can be shared across process versions.
        Ordering and routing are defined in ProcessStep and StepEdge tables.

        Versioning (leaf-style): Steps have no DRAFT/APPROVED status lifecycle, so
        content edits are routed through `create_new_version` automatically. Only
        `archived` bypasses versioning (archive-in-place).
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        operation_number:
          type: string
          description: Human-facing operation number for travelers/routing (e.g. '10',
            '20', 'OP-30'). Free-form; blank falls back to the routing position.
          maxLength: 20
        expected_duration:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        block_on_quarantine:
          type: boolean
        requires_qa_signoff:
          type: boolean
        sampling_required:
          type: boolean
        min_sampling_rate:
          type: number
          format: double
          description: Minimum % of parts that must be sampled at this step
        pass_threshold:
          type: number
          format: double
        requires_first_piece_inspection:
          type: boolean
          description: If True, first part of each work order at this step requires
            FPI before others can proceed
        part_type:
          type: string
          format: uuid
        step_type:
          allOf:
          - $ref: '#/components/schemas/StepTypeEnum'
          description: |-
            Visual type for flow editor.

            * `TASK` - Task
            * `START` - Start
            * `DECISION` - Decision
            * `REWORK` - Rework
            * `TIMER` - Timer/Wait
            * `TERMINAL` - Terminal
            * `RECEIVING` - Receiving Inspection
        is_outside_process:
          type: boolean
          description: 'If True, this step is performed by an outside vendor: parts
            are sent out (StepExecution send stamps / OutsideProcessShipment) and
            run a receiving-style return inspection when they come back. See services/mes/outside_process.py.'
        outside_supplier:
          type: string
          format: uuid
          nullable: true
          description: Default subcontract vendor for this outside-process op (overridable
            per shipment).
        is_decision_point:
          type: boolean
        decision_type:
          oneOf:
          - $ref: '#/components/schemas/DecisionTypeEnum'
          - $ref: '#/components/schemas/BlankEnum'
        is_terminal:
          type: boolean
        terminal_status:
          oneOf:
          - $ref: '#/components/schemas/TerminalStatusEnum'
          - $ref: '#/components/schemas/BlankEnum'
        max_visits:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
          description: Max times a part can visit this step. Null = unlimited.
        revisit_assignment:
          $ref: '#/components/schemas/RevisitAssignmentEnum'
        revisit_role:
          type: string
          format: uuid
          nullable: true
          description: Required role when revisit_assignment='role'
        sequencing_mode:
          type: string
          minLength: 1
          description: How this Op's substeps are ordered for the operator. 'sequential'
            = substep N requires N-1 complete; 'free_order' = any order. Choices defined
            in Tracker.models.dwi.SequencingMode.
          maxLength: 20
        archived:
          type: boolean
      required:
      - name
      - part_type
    SubjectKindEnum:
      enum:
      - fpi_record
      - material_lot
      - shipment
      - operation
      type: string
      description: |-
        * `fpi_record` - fpi_record
        * `material_lot` - material_lot
        * `shipment` - shipment
        * `operation` - operation
    SubmitProcessForApprovalRequestRequest:
      type: object
      properties:
        reason:
          type: string
          minLength: 1
          description: Optional reason for approval request
    SubmitProcessForApprovalResponse:
      type: object
      properties:
        process:
          $ref: '#/components/schemas/ProcessWithSteps'
        approval_request_id:
          type: string
          format: uuid
        approval_number:
          type: string
      required:
      - approval_number
      - approval_request_id
      - process
    Substep:
      type: object
      description: |-
        Substep — the unit of work instruction within a Step.

        The `body_blocks` field is a TipTap document JSON: `{type: 'doc',
        content: [...]}`. Frontend uses the type at
        `ambac-tracker-ui/src/types/dwi.ts` (DwiDocument).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        step:
          type: string
          format: uuid
          description: The parent Op this substep belongs to.
        step_name:
          type: string
          readOnly: true
          nullable: true
        order:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Position within the parent Op's substep sequence (0-indexed).
        title:
          type: string
          description: Short human-readable title shown in substep listings.
          maxLength: 200
        body_blocks:
          description: 'TipTap document JSON. Shape: {type: ''doc'', content: [...]}.
            See ambac-tracker-ui/src/types/dwi.ts (DwiDocument) for the node vocabulary.'
        is_optional:
          type: boolean
          description: Operator may mark this substep N/A instead of completing it.
        is_critical:
          type: boolean
          description: Safety-critical substep. When True, N/A is impossible regardless
            of `allow_not_applicable` or `is_optional`; the gate will reject any SubstepCompletion
            with marked_not_applicable=True for this substep, even at gate-time re-check.
        allow_not_applicable:
          type: boolean
          description: 'Engineer authoring concern: when True, an operator may mark
            this substep N/A (must provide na_reason_code on the SubstepCompletion
            row). When False, N/A is rejected at write time. Ignored when is_critical=True.'
        requires_signature:
          type: boolean
          description: Operator must sign at substep completion. Distinct from inline
            AttestationCheckpoint(kind='signature') nodes within the body, which are
            gates inside the substep flow.
        is_inspection_point:
          type: boolean
          description: 'When True, MeasurementInput captures within this substep additionally
            create inspection records (QualityReports + MeasurementResult) via services/qms/inline_capture.py,
            firing the existing record_quality_report_side_effects pipeline (auto-quarantine
            on out-of-spec, ncr.opened notification, sampling fallback). Default False
            = process data only. Set True for FAI substeps, in-process hold-points,
            final inspection. See architectural decision #21 in the DWI design doc.'
        expected_duration:
          type: string
          nullable: true
          description: Estimated time the substep typically takes. Informational.
        scope:
          allOf:
          - $ref: '#/components/schemas/ScopeEnum'
          description: |-
            Whether the substep runs per part (SAMPLED, default — uses sampling_rule for cadence, null rule = 100%) or once for the whole batch (BATCH — oven cycles, wash tanks, plating baths). BATCH substeps write captures against a `BatchExecution` shared by every part in the batch, instead of per-part `StepExecution`.

            * `sampled` - Per part (sampling)
            * `batch` - Per batch
        sampling_rule:
          type: string
          format: uuid
          nullable: true
          description: Only meaningful when scope=SAMPLED. If set, the substep only
            applies to parts this rule selects. Null = substep always applies to every
            part visiting the step (100% sample). Ignored when scope=BATCH.
        source_library_substep_id:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
          description: 'Forward-compatible: id of the LibrarySubstep this was inserted
            from.'
        source_library_version:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
          description: 'Forward-compatible: version of the LibrarySubstep at insert
            time.'
        is_editable:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        archived:
          type: boolean
      required:
      - created_at
      - id
      - is_editable
      - step
      - step_name
      - title
      - updated_at
    SubstepCompletion:
      type: object
