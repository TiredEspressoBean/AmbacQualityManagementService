          type: string
          nullable: true
          readOnly: true
        completed_at:
          type: string
          format: date-time
          readOnly: true
          description: UTC timestamp when the completion was recorded.
        marked_not_applicable:
          type: boolean
          description: Set when the operator marks an optional substep N/A instead
