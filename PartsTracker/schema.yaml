  /api/SamplingDecisions/:
    get:
      operationId: api_SamplingDecisions_list
      description: |-
        Read-only access to live SamplingDecision rows.

        Operator runtime queries `?step_execution=<id>` to discover which
        substeps are SELECTED / DESELECTED / PENDING for this part and skip
        sampled-out work. Decisions are written by the sampling subsystem
        on step entry (`Tracker.services.dwi.sampling_decisions`); they're
        not editable through the API.
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: outcome
        schema:
          type: string
          enum:
          - deselected
          - pending
          - selected
        description: |-
          What the rule decided — SELECTED, DESELECTED, or PENDING.

          * `selected` - Selected
          * `deselected` - Deselected
          * `pending` - Pending
      - in: query
        name: step_execution
        schema:
          type: string
          format: uuid
      - in: query
        name: substep
        schema:
          type: string
          format: uuid
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSamplingDecisionList'
          description: ''
