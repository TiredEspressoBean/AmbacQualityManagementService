    SupplierQualification:
      type: object
      description: |-
        Base serializer for SecureModel instances.

        Tenant safety: sets ``serializer_related_field`` so DRF auto-generates
        FK fields as ``TenantScopedPrimaryKeyRelatedField`` — these re-scope their
        lookup queryset to the current-request tenant, so a request body can't
        reference another tenant's row by PK. The scoped field no-ops on
        non-tenant target models (User, ContentType, …), so those are unaffected.

        This is why serializers should inherit ``SecureModelMixin`` instead of
        ``serializers.ModelSerializer`` directly. ``test_serializer_fk_tenant_scoping``
        guards against FK fields that bypass this.

        NOTE: this is now a concrete ``ModelSerializer`` subclass, not a bare
        mixin — declare it as the FIRST/sole serializer base. Listing
        ``serializers.ModelSerializer`` alongside it is redundant and (when listed
        before it) an MRO error.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        qualification_number:
          type: string
          readOnly: true
        supplier:
          type: string
          format: uuid
        supplier_name:
          type: string
          readOnly: true
        scope_type:
          $ref: '#/components/schemas/ScopeTypeEnum'
        part_type:
          type: string
          format: uuid
          nullable: true
        scope_label:
          type: string
          description: Commodity or special-process name for COMMODITY/SPECIAL_PROCESS
            scopes.
          maxLength: 120
        scope_display:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/QualificationStatusEnum'
          readOnly: true
        status_display:
          type: string
          readOnly: true
        basis:
          oneOf:
          - $ref: '#/components/schemas/BasisEnum'
          - $ref: '#/components/schemas/BlankEnum'
        effective_date:
          type: string
          format: date
          nullable: true
        expiry_date:
          type: string
          format: date
          nullable: true
        approval_request:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        qualified_by:
          type: integer
          readOnly: true
          nullable: true
        notes:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        archived:
          type: boolean
      required:
      - approval_request
      - created_at
      - id
      - qualification_number
      - qualified_by
      - scope_display
      - status
      - status_display
      - supplier
      - supplier_name
      - updated_at
    SupplierQualificationRequest:
