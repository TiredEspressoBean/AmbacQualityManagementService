  /api/Steps/:
    get:
      operationId: api_Steps_list
      description: |-
        Mixin that filters all querysets to the current tenant and applies user permissions.

        This is the primary mixin for most ViewSets. It:
        - Enforces tenant-scoped permissions (TenantModelPermissions)
        - Filters queryset to current tenant
        - Applies for_user() filtering (permission-based data scoping)
        - Auto-assigns tenant on create
        - Prevents cross-tenant access

        Permission Enforcement:
        - GET/HEAD/OPTIONS -> view_{model} permission
        - POST -> add_{model} permission
        - PUT/PATCH -> change_{model} permission
        - DELETE -> delete_{model} permission

        Superusers bypass both permission checks and tenant filtering.

        Query parameters:
        - include_archived=true: Include soft-deleted records (default: false)
        - tenant=<uuid>: (superuser only) Filter to specific tenant

        Usage:
            class OrderViewSet(TenantScopedMixin, viewsets.ModelViewSet):
                queryset = Order.objects.all()
                serializer_class = OrderSerializer
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: part_type
        schema:
          type: string
        description: Filter steps by process's part type UUID
      - in: query
        name: process
        schema:
          type: string
        description: Filter steps by process UUID (via ProcessStep)
      - in: query
        name: process_memberships__process
        schema:
          type: string
          format: uuid
      - in: query
        name: process_memberships__process__part_type
        schema:
          type: string
          format: uuid
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: standalone
        schema:
          type: boolean
        description: True = steps not attached to any process (e.g. purchased-material
          RIPs).
      - in: query
        name: step_type
        schema:
          type: string
          enum:
          - DECISION
          - RECEIVING
          - REWORK
          - START
          - TASK
          - TERMINAL
          - TIMER
        description: |-
          Visual type for flow editor.

          * `TASK` - Task
          * `START` - Start
          * `DECISION` - Decision
          * `REWORK` - Rework
          * `TIMER` - Timer/Wait
          * `TERMINAL` - Terminal
          * `RECEIVING` - Receiving Inspection
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedStepsList'
          description: ''
