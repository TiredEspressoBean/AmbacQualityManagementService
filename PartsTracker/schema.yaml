    MaterialLot:
      type: object
      description: |-
        Material lot serializer with hybrid versioning routing.

        Spec/content field edits (supplier, material_type, expiration_date,
        manufacture_date, supplier_lot_number, material_description, storage_location,
        certificate_of_conformance, unit_of_measure, lot_number, received_date)
        route through ``create_new_version``.

        Operational field edits (quantity_remaining, status, archived) use a plain
        save so every consumption event does not mint a new version row.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        lot_number:
          type: string
          maxLength: 100
        parent_lot:
          type: string
          format: uuid
          nullable: true
        parent_lot_number:
          type: string
          readOnly: true
          nullable: true
        material_type:
          type: string
          format: uuid
          nullable: true
        material_type_name:
          type: string
          readOnly: true
          nullable: true
        material_description:
          type: string
          description: Description for raw materials not tracked as PartTypes
          maxLength: 200
        supplier:
          type: string
          format: uuid
          nullable: true
        supplier_name:
          type: string
          readOnly: true
          nullable: true
        supplier_lot_number:
          type: string
          description: Supplier's lot/batch number
          maxLength: 100
        erp_po_number:
          type: string
          description: ERP purchase-order reference (UQMES does not own purchasing).
          maxLength: 100
        promised_date:
          type: string
          format: date
          nullable: true
          description: Supplier's promised delivery date (from the PO); drives on-time-delivery
            scoring.
        received_date:
          type: string
          format: date
        received_by:
          type: integer
          readOnly: true
        quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,4})?$
        quantity_remaining:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,4})?$
          readOnly: true
        unit_of_measure:
          type: string
          maxLength: 20
        status:
          $ref: '#/components/schemas/MaterialLotStatusEnum'
        hold_reason:
          type: string
          readOnly: true
          description: Why a lot is held/quarantined (e.g. SUPPLIER_UNQUALIFIED).
            Lets the receiving queue explain a hold.
        manufacture_date:
          type: string
          format: date
          nullable: true
        expiration_date:
          type: string
          format: date
          nullable: true
        certificate_of_conformance:
          type: string
          format: uri
          nullable: true
        storage_location:
          type: string
          maxLength: 100
        child_lot_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        archived:
          type: boolean
        version:
          type: integer
          readOnly: true
      required:
      - child_lot_count
      - created_at
      - hold_reason
      - id
      - lot_number
      - material_type_name
      - parent_lot_number
      - quantity
      - quantity_remaining
      - received_by
      - received_date
      - supplier_name
      - unit_of_measure
      - updated_at
      - version
