    SamplingDecision:
      type: object
      description: |-
        Append-only sampling decision per (StepExecution, Substep). The
        operator runtime queries `?step_execution=<id>` to discover which
        substeps are SELECTED / DESELECTED / PENDING and grey out the
        sampled-out ones.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        step_execution:
          type: string
          format: uuid
          readOnly: true
          description: The (part, step, visit) this decision applies to.
        substep:
          type: string
          format: uuid
          readOnly: true
          description: The substep whose sampling_rule produced this decision.
        outcome:
          allOf:
          - $ref: '#/components/schemas/OutcomeEnum'
          readOnly: true
          description: |-
            What the rule decided — SELECTED, DESELECTED, or PENDING.

            * `selected` - Selected
            * `deselected` - Deselected
            * `pending` - Pending
        ruleset_version:
          type: integer
          readOnly: true
          description: Version of the SamplingRuleSet that produced this decision.
            Audit can answer 'what rule was active when this was decided' via this
            field; rule edits bump the version on supersession.
        decided_at:
          type: string
          format: date-time
          readOnly: true
          description: UTC timestamp the decision was written.
        superseded_by:
          type: string
          format: uuid
          readOnly: true
          nullable: true
          description: When a rule change invalidates this decision, the new SamplingDecision
            row's id goes here. Null = this decision is live.
      required:
      - decided_at
      - id
      - outcome
      - ruleset_version
      - step_execution
      - substep
      - superseded_by
