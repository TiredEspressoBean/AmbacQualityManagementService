        approval_template:
          type: string
          format: uuid
          nullable: true
          description: Approval template to use for this document type (defaults to
            DOCUMENT_RELEASE if not set)
        default_review_period_days:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
          description: Default number of days between reviews for documents of this
            type (e.g., 365 for annual review)
