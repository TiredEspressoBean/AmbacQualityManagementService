    ProcessWithSteps:
      type: object
      description: |-
        Process with steps serializer for creation/updates.

        Uses graph structure:
        - `nodes`: Step definitions (id, name, step_type, etc.)
        - `edges`: Connections between steps (from_step, to_step, edge_type)

        Frontend sends:
        {
            "name": "My Process",
            "part_type": 1,
            "nodes": [
                {"id": 1, "name": "Step 1", "order": 1, ...},  # existing step
                {"id": -1, "name": "New Step", "order": 2, ...},  # new step (negative ID)
            ],
            "edges": [
                {"from_step": 1, "to_step": -1, "edge_type": "default"},  # can reference temp IDs
            ]
        }
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 50
        is_remanufactured:
          type: boolean
        is_disassembly:
          type: boolean
          description: When True, this Process is eligible to be selected as a teardown
            process for Cores of its `part_type`. A single core_type may have multiple
            eligible disassembly Processes (quick teardown, full overhaul, failure-analysis);
            the operator picks at WO creation.
        part_type:
          type: string
          format: uuid
        process_steps:
          type: array
          items:
            $ref: '#/components/schemas/ProcessStep'
          readOnly: true
        step_edges:
          type: array
          items:
            $ref: '#/components/schemas/StepEdge'
          readOnly: true
        status:
          allOf:
