  /api/SamplingDecisions/reconcile/:
    post:
      operationId: api_SamplingDecisions_reconcile_create
      description: |-
        POST /api/SamplingDecisions/reconcile/

        Supervisor-triggered reconciliation of PENDING decisions for a
        WorkOrder (optionally narrowed to a step). Resolves rules like
        LAST_N_PARTS / EXACT_COUNT now that the cohort is closed.

        Body: { "work_order_id": "<uuid>", "step_id"?: "<uuid>" }

        Returns a summary: { reconciled, now_selected, now_deselected,
        still_pending }. Supervisor UI uses this to surface what flipped.
      tags:
      - api
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SamplingDecision'
          description: ''
  /api/SamplingSeverityStates/:
    get:
      operationId: api_SamplingSeverityStates_list
      description: |-
        Read-only runtime Z1.4 severity state per (receiving step, supplier).

        Mutations belong exclusively to the switching engine
        (`services.qms.severity_switching.update_after_lot`) — this surface exists
        so inspector/supplier views can show the effective severity and the
        switch-back position instead of hiding the machinery (the SAP-QM opacity
        problem from the round-4 research).
      parameters:
      - in: query
        name: discontinued
        schema:
          type: boolean
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
