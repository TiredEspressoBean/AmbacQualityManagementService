          maxLength: 64
        kind:
          allOf:
          - $ref: '#/components/schemas/KindEnum'
          description: |-
            Which kind of capture node produced this response.

            * `text` - Text input
            * `choice` - Choice (radio / select)
            * `photo` - Photo capture
            * `video` - Video capture
            * `scan` - Barcode / QR scan
            * `file` - File upload
            * `timer` - Timer (countdown / stopwatch)
