        description:
          type: string
        enabled:
          type: boolean
        provider_kind:
          type: string
          minLength: 1
          description: ScheduledContentProvider registry key.
          maxLength: 64
        provider_params:
          description: 'Params passed to the provider. For customer-scoped schedules,
            the dispatcher merges in {''customer_id'': scope_customer.id} before invoking
            the provider.'
        cadence:
          $ref: '#/components/schemas/CadenceEnum'
        day_of_week:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
          description: 0=Monday ... 6=Sunday. Required when cadence='weekly'.
        day_of_month:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          nullable: true
          description: 1-28 (capped to avoid Feb/short-month gotchas). Required when
            cadence='monthly'.
        time_of_day:
          type: string
          format: time
          description: Local clock time in the schedule's timezone.
        timezone:
          type: string
          minLength: 1
          description: IANA timezone name (e.g. 'America/New_York'). Defaults to UTC;
            the fire task falls back to tenant.default_timezone if 'UTC' is set and
            the tenant configured a non-UTC default.
          maxLength: 64
        channels:
          description: List of channel codes, e.g. ['email']. Email-only at launch.
