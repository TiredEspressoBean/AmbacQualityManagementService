  /api/process-change-orders/:
    get:
      operationId: api_process_change_orders_list
      description: |-
        CRUD + lifecycle actions for ProcessChangeOrder.

        POs are created indirectly via PCR approval — the POST endpoint
        is disallowed; PCO comes into existence as a side-effect of
        approving its parent PCR.

        Lifecycle endpoints:
            POST /api/process-change-orders/{id}/author/    {implementation_plan?, effective_date?}
            POST /api/process-change-orders/{id}/approve/   (REGULATED — creates ApprovalRequest)
            POST /api/process-change-orders/{id}/mark-approved/  (used post-signature collection)
            POST /api/process-change-orders/{id}/implement/ {migration_disposition, ...}
            POST /api/process-change-orders/{id}/cancel/    {reason?}
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: migration_disposition
        schema:
          type: string
          enum:
          - KEEP_ALL
          - MIGRATE_ALL
          - MIGRATE_SELECTED
          - PENDING
        description: |-
          * `PENDING` - Pending
          * `MIGRATE_ALL` - Migrate All
          * `MIGRATE_SELECTED` - Migrate Selected
          * `KEEP_ALL` - Keep All
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: request
        schema:
          type: string
          format: uuid
      - in: query
        name: status
        schema:
          type: string
          enum:
          - APPROVED
          - CANCELLED
          - DRAFT
          - IMPLEMENTED
          - IN_IMPLEMENTATION
        description: |-
          * `DRAFT` - Draft
          * `APPROVED` - Approved
          * `IN_IMPLEMENTATION` - In Implementation
          * `IMPLEMENTED` - Implemented
          * `CANCELLED` - Cancelled
      tags:
      - api
