        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - CLOSED
          - RETURNED
          - SENT
        description: |-
          * `SENT` - Sent Out
          * `RETURNED` - Returned
