          type: string
          format: date-time
          readOnly: true
        scope_customer:
          type: string
          format: uuid
        recipient_users:
          type: array
          items:
            type: integer
        recipient_groups:
          type: array
          items:
            type: string
            format: uuid
        recipient_external:
          type: array
