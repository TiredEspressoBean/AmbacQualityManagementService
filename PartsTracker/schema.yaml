    ShiftNote:
      type: object
      description: |-
        Base serializer for SecureModel instances.

        Tenant safety: sets ``serializer_related_field`` so DRF auto-generates
        FK fields as ``TenantScopedPrimaryKeyRelatedField`` — these re-scope their
        lookup queryset to the current-request tenant, so a request body can't
        reference another tenant's row by PK. The scoped field no-ops on
        non-tenant target models (User, ContentType, …), so those are unaffected.

        This is why serializers should inherit ``SecureModelMixin`` instead of
        ``serializers.ModelSerializer`` directly. ``test_serializer_fk_tenant_scoping``
        guards against FK fields that bypass this.

        NOTE: this is now a concrete ``ModelSerializer`` subclass, not a bare
        mixin — declare it as the FIRST/sole serializer base. Listing
        ``serializers.ModelSerializer`` alongside it is redundant and (when listed
        before it) an MRO error.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        author:
          type: integer
          readOnly: true
          nullable: true
        author_name:
          type: string
          nullable: true
          readOnly: true
        body:
          type: string
        audience_roles:
          type: array
          items:
            type: string
            maxLength: 100
          description: Tenant group names targeted; empty = all floor staff.
        work_order:
          type: string
          format: uuid
          nullable: true
        work_order_erp_id:
          type: string
          nullable: true
          readOnly: true
        priority:
          $ref: '#/components/schemas/ShiftNotePriorityEnum'
        acknowledgment_required:
          type: boolean
        effective_from:
          type: string
          format: date-time
          nullable: true
        effective_until:
          type: string
          format: date-time
          nullable: true
        is_locked:
          type: boolean
          readOnly: true
        acknowledged:
          type: boolean
          readOnly: true
        ack_count:
          type: integer
          readOnly: true
        acknowledged_by:
          type: array
          items:
            $ref: '#/components/schemas/ShiftNoteAckRosterItem'
          readOnly: true
        audience_size:
          type: integer
          readOnly: true
        is_voided:
          type: boolean
          readOnly: true
          description: Whether this record has been voided
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - ack_count
      - acknowledged
      - acknowledged_by
      - audience_size
      - author
      - author_name
      - body
      - created_at
      - id
      - is_locked
      - is_voided
      - updated_at
      - work_order_erp_id
    ShiftNoteAckRosterItem:
