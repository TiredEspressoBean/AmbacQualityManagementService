    post:
      operationId: api_User_bulk_reconcile_create
      description: 'Reconcile the tenant''s user roster to match a list of row descriptors.
        State-based: each row describes a desired user; missing emails are created
        + invited, existing emails are updated to match. Accepts either inline `rows`
        in JSON, or a CSV/Excel file upload via multipart form-data.'
      tags:
      - Users
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BulkReconcileUsersRequestRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/BulkReconcileUsersRequestRequest'
      security:
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '207':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkReconcileUsersResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Bad request (no rows, bad file)
          description: ''
