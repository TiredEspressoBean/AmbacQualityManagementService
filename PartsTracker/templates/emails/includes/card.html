{% comment %}
Reusable card component for email templates.
Usage: {% include "emails/includes/card.html" with card_content=card_content %}

Or wrap content using the card_start/card_end includes.
{% endcomment %}
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="margin-bottom: {{ margin_bottom|default:'20px' }};">
    <tr>
        <td style="padding: 16px; background-color: #fafafa; border: 1px solid #e4e4e7; border-radius: 8px;">
            {{ card_content }}
        </td>
    </tr>
</table>
