[global]
# Repository configuration
# For NAS: mount your NAS at /var/lib/pgbackrest on the host
# For local: uses the pgbackrest_repo docker volume
repo1-path=/var/lib/pgbackrest
repo1-retention-full=4
repo1-retention-diff=14

# Encryption (AES-256-CBC for CMMC compliance)
repo1-cipher-type=aes-256-cbc
# Set via environment variable PGBACKREST_REPO1_CIPHER_PASS

# Compression (zstd for speed + ratio balance)
compress-type=zst
compress-level=3

# Parallel processing
process-max=2

# Logging
log-level-console=info
log-level-file=detail
log-path=/var/log/pgbackrest

# Lock path
lock-path=/var/spool/pgbackrest

[tracker]
# PostgreSQL connection (local - runs inside postgres container)
pg1-path=/var/lib/postgresql/data
pg1-port=5432
pg1-user=postgres
pg1-socket-path=/var/run/postgresql